# Storage (persistant)

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: site-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# Scheduling (refresh at 2:15 AM)

apiVersion: batch/v1
kind: CronJob
metadata:
  name: site-refresh
spec:
  schedule: "15 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: ubuntu-downloader
              image: ubuntu:24.04
              command: ["/bin/bash", "/scripts/download.sh"]
              volumeMounts:
                - name: script-volume
                  mountPath: /scripts
                - name: web-site-storage
                  mountPath: /data
          restartPolicy: OnFailure
          volumes:
            - name: script-volume
              configMap:
                name: download-script
                defaultMode: 0777
            - name: web-site-storage
              persistentVolumeClaim:
                claimName: site-pvc

---
# Nginx serving the shared data

apiVersion: v1
kind: Pod
metadata:
  name: nginx-server
spec:
  containers:
    - name: nginx
      image: nginx:1.29.5-alpine
      volumeMounts:
        - name: web-site-storage
          mountPath: /usr/share/nginx/html
  volumes:
    - name: web-site-storage
      persistentVolumeClaim:
        claimName: site-pvc
