apiVersion: apps/v1
kind: Deployment
metadata:
  name: csd-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: csd-web
  template:
    metadata:
      labels:
        app: csd-web
    spec:
      containers:
        - name: nginx-downloader
          image: tzeortziana/nginx-downloader:v1
          imagePullPolicy: Always
          env:
            - name: URL
              value: "https://www.csd.uoc.gr"
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: csd-service
spec:
  type: NodePort
  selector:
    app: csd-web
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
