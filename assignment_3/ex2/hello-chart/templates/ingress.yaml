apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.appName }}-ingress
spec:
  rules:
  - http:
      paths:
      - path: {{ .Values.endpoint}}
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.appName }}
            port:
              number: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.appName }}
spec:
  type: ClusterIP
  ports:
  - port: 8080
  selector:
    app: {{ .Values.appName }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.appName }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.appName }}
  template:
    metadata:
      labels:
        app: {{ .Values.appName }}
    spec:
      containers:
      - name: {{ .Values.appName }}-kubernetes
        image: carvicsforth/hello-kubernetes:1.10
        env:
        - name: MESSAGE
          value: {{ .Values.message}} 
        - name: HANDLER_PATH_PREFIX
          value: {{ .Values.endpoint}}
        - name: RENDER_PATH_PREFIX
          value: {{ .Values.endpoint}}
        {{- if .Values.resources }}
        resources:              
          limits:
            {{- if .Values.resources.cpu }}
            cpu: {{ .Values.resources.cpu}}
            {{- end }}
            {{- if .Values.resources.memory }}
            memory: {{ .Values.resources.memory}}
            {{- end }}
        {{- end }}

--- 

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.appName }}-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.appName }}
  maxReplicas: {{ .Values.autoscaler.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
